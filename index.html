<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karthikeyan Ramalingam | Portfolio</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <!-- React + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel (compiles JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Shared data (plain JS — must load before React components) -->
  <script src="js/data.js"></script>
</head>
<body>

  <canvas id="bg"></canvas>
  <div id="root"></div>

  <!-- React components — loaded in dependency order -->
  <script type="text/babel" src="js/ThreeBackground.js"></script>
  <script type="text/babel" src="js/Navbar.js"></script>
  <script type="text/babel" src="js/Hero.js"></script>
  <script type="text/babel" src="js/About.js"></script>
  <script type="text/babel" src="js/Skills.js"></script>
  <script type="text/babel" src="js/Tools.js"></script>
  <script type="text/babel" src="js/Experience.js"></script>
  <script type="text/babel" src="js/Education.js"></script>
  <script type="text/babel" src="js/Contact.js"></script>
  <script type="text/babel" src="js/Footer.js"></script>

  <script type="text/babel" src="js/WelcomeSplash.js"></script>

  <!-- App root — renders everything into #root -->
  <script type="text/babel" src="js/App.js"></script>

  <!-- Bidirectional scroll-reveal observer -->
  <script>
    (function () {
      var lastY = window.scrollY;

      function initReveal() {
        // Select targets: section titles, cards, timeline items, skill cards, etc.
        var selectors = [
          '.section-title',
          '.about-grid .card',
          '.skill-card',
          '.tl-item',
          '.edu-card',
          '.tool-card',
          '.contact-card',
          '.skill-partition'
        ];

        selectors.forEach(function (sel) {
          document.querySelectorAll(sel).forEach(function (el, i) {
            el.classList.add('sr');
            // Alternate left/right for timeline items
            if (sel === '.tl-item') {
              el.classList.add(i % 2 === 0 ? 'sr-left' : 'sr-right');
            } else {
              el.classList.add('sr-up');
            }
          });
        });

        // Add stagger to grids
        document.querySelectorAll('.skills-grid, .edu-grid, .about-grid').forEach(function (g) {
          g.classList.add('sr-stagger');
        });

        var obs = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            var el = entry.target;
            if (entry.isIntersecting) {
              el.classList.add('visible');
            } else {
              el.classList.remove('visible');
              var wasAbove = entry.boundingClientRect.top < 0;
              el.classList.remove('sr-up', 'sr-down', 'sr-left', 'sr-right');
              if (el.classList.contains('tl-item')) {
                var idx = Array.from(el.parentElement.children).indexOf(el);
                el.classList.add(idx % 2 === 0 ? 'sr-left' : 'sr-right');
              } else {
                el.classList.add(wasAbove ? 'sr-down' : 'sr-up');
              }
            }
          });
        }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });

        document.querySelectorAll('.sr').forEach(function (el) { obs.observe(el); });
      }

      // Wait for React to finish rendering (after splash)
      setTimeout(initReveal, 4800);
    })();
  </script>

</body>
</html>
